kind = "web"
previewPath = "/"
title = "Portal Dimasur"
version = "1.0.0"
id = "artifacts/dimasur-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20363
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dimasur-portal run dev"

[services.env]
PORT = "20363"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dimasur-portal", "run", "build"]
publicDir = "artifacts/dimasur-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
